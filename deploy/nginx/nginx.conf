# Reverse proxy in front of the API. In production this is also where TLS
# terminates and where edge rate-limiting/IP allowlisting lives.
worker_processes auto;
events { worker_connections 1024; }

http {
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 12m;          # matches app body guard (+ headroom)
    server_tokens off;                 # don't leak nginx version

    # Edge rate-limit zone (defence in depth alongside the app limiter).
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

    upstream api_upstream {
        server api:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Security headers at the edge (app sets them too; harmless overlap).
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;

        location / {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;   # propagate trace id
            proxy_read_timeout 60s;
        }

        # Don't expose internal metrics through the public edge.
        location /metrics { deny all; }
    }
}

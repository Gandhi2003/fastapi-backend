name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Static quality gate: lint + format + types -------------------------- #
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: pip install uv
      - name: Install deps
        run: uv pip install --system -r pyproject.toml --extra dev
      - name: Ruff (lint)
        run: ruff check app tests
      - name: Black (format check)
        run: black --check app tests
      - name: Mypy (types)
        run: mypy app

  # --- Tests against real Postgres + Redis service containers --------------- #
  test:
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: crm
          POSTGRES_PASSWORD: crm_password
          POSTGRES_DB: crm_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U crm" --health-interval 10s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      SECRET_KEY: test-secret-key
      JWT_ALGORITHM: HS256
      POSTGRES_HOST: localhost
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm_password
      POSTGRES_DB: crm_test
      REDIS_HOST: localhost
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install uv
      - run: uv pip install --system -r pyproject.toml --extra dev
      - name: Run migrations
        run: alembic upgrade head
      - name: Pytest + coverage
        run: pytest
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  # --- Build & push image (only on main) ----------------------------------- #
  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:latest,ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

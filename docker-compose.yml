# Local / staging stack. In production, Postgres & Redis are managed services and
# the app/workers run on Kubernetes — but the topology mirrors this file.
name: crm-backend

services:
  # One-shot schema migration. Runs to completion, then exits. The app/worker
  # never run DDL themselves (a 4-worker gunicorn would race `upgrade head`),
  # so this is the single writer that brings the DB to head before they start.
  # In production (Kubernetes) this maps to an initContainer / pre-upgrade Job.
  migrate:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    command: alembic upgrade head
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
    restart: "no"

  api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    ports:
      - "8000:8000"
    volumes:
      - ./keys:/app/keys:ro
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    command: celery -A app.workers.celery_app worker -l info --concurrency=4
    env_file: .env
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    command: celery -A app.workers.celery_app beat -l info
    env_file: .env
    depends_on:
      redis: { condition: service_healthy }
    restart: unless-stopped

  flower:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    command: celery -A app.workers.celery_app flower --port=5555
    env_file: .env
    ports: ["5555:5555"]
    depends_on: [redis]

  nginx:
    image: nginx:1.27-alpine
    depends_on: [api]
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports: ["5433:5432"]   # host 5433 -> container 5432 (host 5432 used by local postgres@14)

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    ports: ["6379:6379"]

  # --- local-only support services ---
  mailpit:
    image: axllent/mailpit:latest
    ports: ["1025:1025", "8025:8025"]   # SMTP / web UI

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - miniodata:/data
    ports: ["9000:9000", "9001:9001"]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports: ["3001:3000"]
    depends_on: [prometheus]

volumes:
  pgdata:
  redisdata:
  miniodata:
